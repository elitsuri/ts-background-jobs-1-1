<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>ts-background-jobs-1 Admin</title>
<style>:root{--primary:#4ade80;--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--border:#334155;--danger:#ef4444}
*{{box-sizing:border-box;margin:0;padding:0}}body{{background:var(--bg);color:var(--text);font-family:system-ui;padding:2rem}}
h1{color:var(--primary);margin-bottom:1.5rem}table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:.5rem}
th,td{{padding:.75rem;border-bottom:1px solid var(--border);text-align:left}}th{{opacity:.6;font-size:.8rem;text-transform:uppercase}}
button{{cursor:pointer;border:none;border-radius:.4rem;padding:.4rem .8rem;font-size:.85rem}}
.btn-danger{{background:var(--danger);color:#fff}}</style></head>
<body>
<h1>⚡ ts-background-jobs-1 — Admin Panel</h1>
<div style="background:var(--surface);border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem">
<h2 style='margin-bottom:1rem'>User Management</h2>
<table><thead><tr><th>ID</th><th>Email</th><th>Name</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
<tbody id='users-tbody'></tbody></table></div>
<script>
const TOKEN = localStorage.getItem('token') || '';
async function loadUsers() {
  const r = await fetch('/api/v1/admin/users', {headers:{'Authorization':'Bearer '+TOKEN}});
  const d = await r.json();
  document.getElementById('users-tbody').innerHTML = (d.data||[]).map(u =>
    `<tr><td>${u.id}</td><td>${u.email}</td><td>${u.name||''}</td><td>${u.role}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td><button class='btn-danger' onclick='deleteUser(${u.id})'>Delete</button></td></tr>`
  ).join('');
}
async function deleteUser(id) { if(!confirm('Delete user?')) return; await fetch('/api/v1/admin/users/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+TOKEN}}); loadUsers(); }
loadUsers();
</script></body></html>

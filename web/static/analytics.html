<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>ts-background-jobs-1 Analytics</title>
<style>:root{--primary:#4ade80;--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--border:#334155}
*{{box-sizing:border-box;margin:0;padding:0}}body{{background:var(--bg);color:var(--text);font-family:system-ui;padding:2rem}}
h1{color:var(--primary);margin-bottom:1.5rem}.card{background:var(--surface);border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem}</style></head>
<body>
<h1>📈 ts-background-jobs-1 Analytics</h1>
<div class="card"><h2 style="margin-bottom:1rem">Activity (30 days)</h2>
<svg id="chart" width="100%" height="200"></svg></div>
<div class="card"><h2 style="margin-bottom:1rem">Overview</h2>
<div id="overview" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem"></div></div>
<script>
const TOKEN = localStorage.getItem('token') || '';
async function loadAnalytics() {
  const [ts, ov] = await Promise.all([
    fetch('/api/v1/analytics/timeseries?days=30', {headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json()),
    fetch('/api/v1/analytics/overview', {headers:{'Authorization':'Bearer '+TOKEN}}).then(r=>r.json()),
  ]);
  if (ts.data) {
    const svg = document.getElementById('chart');
    const W = svg.clientWidth||800, H=180;
    const max = Math.max(...ts.data.map(d=>d.count),1);
    const bw = W/ts.data.length-2;
    svg.innerHTML = ts.data.map((d,i)=>`<rect x=${i*(bw+2)} y=${H-d.count/max*H} width=${bw} height=${d.count/max*H} fill='#4ade80' rx='3'/>`).join('');
  }
  if (ov.data) {
    document.getElementById('overview').innerHTML = Object.entries(ov.data).map(([k,v])=>
      `<div style='background:rgba(255,255,255,.05);border-radius:.5rem;padding:1rem;text-align:center'><div style='opacity:.6;font-size:.8rem'>${k}</div><div style='font-size:1.8rem;font-weight:700;color:#4ade80'>${v}</div></div>`
    ).join('');
  }
}
loadAnalytics();
</script></body></html>
